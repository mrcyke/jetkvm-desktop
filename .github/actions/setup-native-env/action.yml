name: Setup Native Env
description: Install native GUI/build dependencies for CI jobs.

inputs:
  install-xvfb:
    description: Install xvfb for headless Linux test runs.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Linux GUI build dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        packages=(
          libgtk-3-dev
          libx11-dev
          libxcursor-dev
          libxrandr-dev
          libxinerama-dev
          libxi-dev
          libgl1-mesa-dev
          libxxf86vm-dev
        )
        if [[ "${{ inputs.install-xvfb }}" == "true" ]]; then
          packages=(xvfb "${packages[@]}")
        fi
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends "${packages[@]}"

    - name: Set up Windows MinGW toolchain
      if: runner.os == 'Windows'
      id: msys2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        release: false
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-gcc-libs

    - name: Prepend Windows MinGW toolchain to PATH
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
      run: |
        "$env:MSYS2_LOCATION\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
