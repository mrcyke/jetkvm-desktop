name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-amd64
            archive_name: jetkvm-desktop-linux-amd64.tar.gz
            client_bin: jetkvm-desktop
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            name: linux-aarch64
            archive_name: jetkvm-desktop-linux-aarch64.tar.gz
            client_bin: jetkvm-desktop
            goos: linux
            goarch: arm64
          - os: macos-15-intel
            name: macos-amd64
            archive_name: jetkvm-desktop-macos-amd64.tar.gz
            client_bin: jetkvm-desktop
            goos: darwin
            goarch: amd64
          - os: macos-15
            name: macos-aarch64
            archive_name: jetkvm-desktop-macos-aarch64.tar.gz
            client_bin: jetkvm-desktop
            goos: darwin
            goarch: arm64
          - os: windows-latest
            name: windows-amd64
            archive_name: jetkvm-desktop-windows-amd64.zip
            client_bin: jetkvm-desktop.exe
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux GUI build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libxxf86vm-dev

      - name: Set up Windows MinGW toolchain
        if: runner.os == 'Windows'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          release: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-libs

      - name: Prepend Windows MinGW toolchain to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          "$env:MSYS2_LOCATION\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Build release binaries (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/pkg
          go build -trimpath -ldflags="-s -w" -o "dist/pkg/${{ matrix.client_bin }}" ./cmd/jetkvm-desktop
          cp README.md dist/pkg/
          tar -C dist/pkg -czf "dist/${{ matrix.archive_name }}" .

      - name: Build release binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          New-Item -ItemType Directory -Force -Path dist/pkg | Out-Null
          go build -trimpath -ldflags="-s -w" -o "dist/pkg/${{ matrix.client_bin }}" ./cmd/jetkvm-desktop
          Copy-Item README.md dist/pkg/README.md
          Compress-Archive -Path dist/pkg/* -DestinationPath "dist/${{ matrix.archive_name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.archive_name }}

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          (cd release && sha256sum * > SHA256SUMS.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/*.zip
            release/SHA256SUMS.txt
